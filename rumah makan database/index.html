<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RM Nusantara</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #5e87b1 0%, #212529 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(113, 56, 56, 0.4);
            background-color: #4f058f;
            padding: 35px;
            width: 100%;
            max-width: 420px;
        }
        .brand-title {
            color: #d8dbde;
            font-weight: 700;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .brand-subtitle {
            color: #6c757d;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #343a40;
            box-shadow: 0 0 0 0.25rem rgba(52, 58, 64, 0.25);
        }
        .btn-login {
            background-color: #2470bd;
            color: rgb(255, 253, 253);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: #495057;
            color: rgb(233, 54, 54);
        }
        .simulation-box {
            background-color: #5694d2;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.85rem;
            border-left: 4px solid #0d6efd;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3 class="brand-title">🍜 RM YangPentingMakan</h3>
    <p class="brand-subtitle">Sistem Admin & Manajemen Hak Akses</p>
    
    <div id="loginAlert" class="alert alert-danger d-none" role="alert">
        Username, password, atau hak akses salah!
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label text-white">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Masukkan username" required>
        </div>
        
        <div class="mb-3">
            <label for="password" class="form-label text-white">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
        </div>
        
        <div class="mb-4">
            <label for="role" class="form-label text-white">Hak Akses / Level</label>
            <select class="form-select" id="role" required>
                <option value="" disabled selected>-- Pilih Level Pengguna --</option>
                <option value="Admin">Admin Utama</option>
                <option value="Manajer">Manajer / User</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-login w-100">Masuk ke Sistem</button>
    </form>

    <div class="mt-4 simulation-box">
        <strong>Akun Demo (Simulasi):</strong><br>
        • Level Admin ➔ User: <code>admin</code> | Pass: <code>admin123</code><br>
        • Level Manajer ➔ User: <code>manajer</code> | Pass: <code>manajer</code>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Mencegah form memuat ulang halaman secara default
        
        // Ambil data dari inputan pengguna
        const usernameInput = document.getElementById('username').value.trim();
        const passwordInput = document.getElementById('password').value.trim();
        const roleInput = document.getElementById('role').value;
        const alertBox = document.getElementById('loginAlert');

        // Logika Pengecekan Hak Akses (Simulasi Database)
        let loginSukses = false;

        // BUGS FIXED: Password admin diubah menjadi admin123 menyesuaikan teks di layar
        if (usernameInput === 'admin' && passwordInput === 'admin123' && roleInput === 'Admin') {
            loginSukses = true;
        } else if (usernameInput === 'manajer' && passwordInput === 'manajer' && roleInput === 'Manajer') {
            loginSukses = true;
        }

        // Jalankan aksi berdasarkan hasil pengecekan
        if (loginSukses) {
            alertBox.classList.add('d-none'); // Sembunyikan alert jika sebelumnya ada error
            
            // Simpan data role temporer di browser agar dashboard tahu siapa yang masuk
            localStorage.setItem('userRole', roleInput);
            localStorage.setItem('isLoggedIn', 'true');
            
            // Alihkan halaman ke dashboard.html
            window.location.href = 'dashboard.html';
        } else {
            // Tampilkan pesan error jika kombinasi salah
            alertBox.classList.remove('d-none');
            alertBox.innerText = "Kombinasi Username, Password, atau Level salah!";
        }
    });
</script>

</body>
</html>
